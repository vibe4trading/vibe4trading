# Upstream for prerender service
upstream prerender {
    server prerender:3000;
}

# Map to detect bot user-agents
map $http_user_agent $is_bot {
    default                             0;
    "~*googlebot"                       1;
    "~*bingbot"                         1;
    "~*yandex"                          1;
    "~*baiduspider"                     1;
    "~*facebookexternalhit"             1;
    "~*twitterbot"                      1;
    "~*rogerbot"                        1;
    "~*linkedinbot"                     1;
    "~*embedly"                         1;
    "~*quora link preview"              1;
    "~*showyoubot"                      1;
    "~*outbrain"                        1;
    "~*pinterest"                       1;
    "~*slackbot"                        1;
    "~*vkshare"                         1;
    "~*redditbot"                       1;
    "~*applebot"                        1;
    "~*whatsapp"                        1;
    "~*flipboard"                       1;
    "~*tumblr"                          1;
    "~*bitlybot"                        1;
    "~*discordbot"                      1;
    "~*google-structured-data-testing"  1;
    "~*google-inspectiontool"           1;
    "~*petalbot"                        1;
    "~*ChatGPT"                         1;
    "~*GPTBot"                          1;
    "~*PerplexityBot"                   1;
    "~*ClaudeBot"                       1;
}

server {
    listen 3000;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to backend (required for prerender headless Chrome)
    # When prerender fetches pages internally, the SPA JS makes /api/* calls
    # that resolve to this nginx — without this block they get index.html instead of JSON.
    location /api/ {
        proxy_pass ${V4T_API_BASE_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        # Proxy settings (applied when proxy_pass is used)
        proxy_set_header X-Prerender 1;
        proxy_read_timeout 30s;

        # If request has X-Prerender header, it's already prerendered — don't loop
        if ($http_x_prerender) {
            set $is_bot 0;
        }

        # Don't prerender static files
        set $prerender_check $is_bot;
        if ($uri ~ "\.(js|css|xml|txt|ico|png|jpg|jpeg|gif|svg|woff|woff2)$") {
            set $prerender_check 0;
        }

        # Proxy to prerender service for bots
        if ($prerender_check = 1) {
            rewrite (.*) /render?url=${PRERENDER_FRONTEND_URL}$1 break;
            proxy_pass http://prerender;
        }

        # Normal SPA serving for humans
        try_files $uri /index.html;
    }
}
