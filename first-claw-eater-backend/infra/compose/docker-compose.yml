services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fce"]
      interval: 2s
      timeout: 2s
      retries: 30

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      FCE_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fce
      FCE_LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn fce.api.app:app --host 0.0.0.0 --port 8000"]

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      FCE_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fce
      FCE_LOG_LEVEL: info
      # Keep the default worker free for dataset imports + replay jobs.
      FCE_WORKER_JOB_TYPES: dataset_import,run_execute_replay
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m fce.worker"]

  worker_live:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      FCE_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fce
      FCE_LOG_LEVEL: info
      FCE_WORKER_JOB_TYPES: run_execute_live
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m fce.worker"]

volumes:
  pg_data:
